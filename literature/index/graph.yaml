    title: Attention is All you Need
    tldr: A new simple network architecture, the Transformer, based solely on self-attention mechanisms, dispensing with recurrence and convolutions entirely is proposed, which generalizes well to other tasks by applying it successfully to English constituency parsing both with large and limited training data.
